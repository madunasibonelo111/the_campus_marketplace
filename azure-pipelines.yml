trigger:
  branches:
    include:
      - main

#pool:
 # vmImage: 'ubuntu-latest'
pool:
  name: 'Default'
  
steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js 20'

  - script: npm install
    displayName: 'Install dependencies'

  #- script: npm test
   # displayName: 'Run tests'

  - script: npm run build
    displayName: 'Build app'